<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - ExploreEase</title>
  <link rel="stylesheet" href="travel_recommendation.css">
</head>
<body>
  <div class="subpage-wrapper"></div>

  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <a href="index.html" class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-1 .1-1.3.5-.4.4-.5 1-.3 1.5L9 12l-4 4H3l-1 1 3 2 2 3 1-1v-2l4-4 3.8 5.8c.2.4.7.6 1.2.5.5-.2.7-.7.6-1.3z"/>
      </svg>
      ExploreEase
    </a>
    
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html" class="active">Contact Us</a></li>
    </ul>
  </nav>

  <!-- Contact Section -->
  <main class="contact-section">
    <h1 class="section-title">CONTACT <span>US</span></h1>
    
    <div class="contact-layout">
      <!-- Contact Info Box -->
      <div class="contact-info">
        <div class="contact-method">
          <div class="contact-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
          </div>
          <div class="contact-text">
            <h4>Phone Support</h4>
            <p>+1 (800) 555-0199</p>
            <p>Mon - Fri, 9am - 6pm EST</p>
          </div>
        </div>

        <div class="contact-method">
          <div class="contact-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </div>
          <div class="contact-text">
            <h4>Email Inquiries</h4>
            <p>hello@exploreease.com</p>
            <p>We reply within 24 hours.</p>
          </div>
        </div>

        <div class="contact-method">
          <div class="contact-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
          </div>
          <div class="contact-text">
            <h4>Headquarters</h4>
            <p>100 Travel Plaza, Suite 400</p>
            <p>New York, NY 10001, USA</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="contact-form-card">
        <form id="contact-form" onsubmit="handleContactSubmit(event)">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email address" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" class="form-control" placeholder="How can we help you?" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary submit-btn">Submit Message</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    function handleContactSubmit(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;

      if (name && email && message) {
        alert(`Thank you, ${name}! Your message has been sent successfully. We will reach out to you at ${email} shortly.`);
        document.getElementById('contact-form').reset();
      }
    }
  </script>
</body>
</html>
