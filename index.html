<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExploreEase - Premium Travel Recommendations</title>
  <link rel="stylesheet" href="travel_recommendation.css">
</head>
<body>
  <div class="hero-wrapper"></div>

  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <a href="index.html" class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-1 .1-1.3.5-.4.4-.5 1-.3 1.5L9 12l-4 4H3l-1 1 3 2 2 3 1-1v-2l4-4 3.8 5.8c.2.4.7.6 1.2.5.5-.2.7-.7.6-1.3z"/>
      </svg>
      ExploreEase
    </a>
    
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>

    <div class="nav-search">
      <div class="search-input-wrapper">
        <input type="text" id="search-input" placeholder="Enter keywords (e.g. beach, temple, Japan)...">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <button class="btn btn-primary" id="btn-search">Search</button>
      <button class="btn btn-secondary" id="btn-reset">Clear</button>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="main-container">
    <!-- Social Sidebar -->
    <div class="social-sidebar">
      <a href="https://twitter.com" target="_blank" class="social-link" title="Twitter / X">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
      <a href="https://facebook.com" target="_blank" class="social-link" title="Facebook">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"/>
        </svg>
      </a>
      <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
        <svg class="stroke-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>
      <a href="https://youtube.com" target="_blank" class="social-link" title="YouTube">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.108C19.53 3.5 12 3.5 12 3.5s-7.53 0-9.388.555A3.002 3.002 0 0 0 .502 6.163C0 8.07 0 12 0 12s0 3.93.502 5.837a3.003 3.003 0 0 0 2.11 2.108C4.47 20.5 12 20.5 12 20.5s7.53 0 9.388-.555a3.002 3.002 0 0 0 2.11-2.108C24 15.93 24 12 24 12s0-3.93-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </a>
    </div>

    <!-- Hero Content -->
    <section class="hero-content">
      <h1 class="hero-headline">DON'T JUST DREAM,<br><span>EXPLORE THE WORLD</span></h1>
      <p class="hero-desc">
        Dive into unique cultural heritages, sink your toes into pristine white sands, or walk amongst sacred, beautiful temples. ExploreEase connects you with handpicked travel destinations globally.
      </p>
      <button class="btn btn-primary" style="padding: 0.9rem 2.5rem; font-size: 1.05rem;" onclick="alert('Booking portal is coming soon!')">Book Now</button>
    </section>

    <!-- Recommendations Results Column (Right side) -->
    <section class="results-wrapper">
      <div id="results-container" class="results-grid">
        <!-- Results will be injected dynamically via JavaScript -->
      </div>
    </section>
  </main>

  <script src="travel_recommendation.js"></script>
</body>
</html>
